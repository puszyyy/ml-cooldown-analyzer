<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ML Cooldown Tracker</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <style>
    /* ===== MOBILE OPTIMIZATION ===== */
    @media (max-width: 768px) {
      .hero-card, .hero-item {
        flex-direction: column;
        gap: 0.75rem;
        padding: 1rem;
      }
      
      .ulti-icon, .spell-icon, .skill-icon {
        width: 64px !important;
        height: 64px !important;
        min-width: 64px;
      }
      
      .cooldown-status, .skill-status, .ready-text {
        font-size: 1.2rem;
        padding: 0.5rem 0;
      }
      
      .ult-level button, .level-btn {
        padding: 12px 16px;
        font-size: 1.1rem;
        min-width: 60px;
      }
      
      .dashboard, .heroes-container {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      
      body, .container, .main {
        padding: 8px !important;
        margin: 0 !important;
      }
      
      input[type="text"], .search-hero {
        font-size: 1.1rem !important;
        padding: 12px !important;
        width: 100%;
        box-sizing: border-box;
      }
      
      button, .clickable, [onclick] {
        min-height: 48px;
        min-width: 48px;
      }
    }
    
    /* ===== MOBILE OPTIMIZATION PARA SA LINEUP (DASHBOARD MODE) ===== */
    @media (max-width: 768px) {
      .enemy {
        padding: 16px !important;
        margin-bottom: 16px !important;
      }
      
      .enemy button:not(.skill-btn):not(.refresh-btn):not(.kill-btn) {
        min-height: 44px !important;
        min-width: 50px !important;
        font-size: 16px !important;
        padding: 10px 12px !important;
      }
      
      .skill-btn {
        width: 55px !important;
        height: 55px !important;
        min-width: 55px !important;
      }
      
      .refresh-btn {
        width: 45px !important;
        height: 45px !important;
        font-size: 18px !important;
      }
      
      .skill-row span, .ready, .cooldown {
        font-size: 16px !important;
        padding: 8px 0 !important;
      }
      
      .skill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px !important;
        margin: 12px 0 !important;
        align-items: center;
      }
      
      .skill-row.items-row {
        gap: 12px !important;
      }
      
      .kill-btn {
        padding: 14px !important;
        font-size: 16px !important;
        margin-top: 16px !important;
      }
      
      .enemy h3 {
        font-size: 18px !important;
        margin-bottom: 12px !important;
      }
      
      .mobile-dropdown > button {
        padding: 14px !important;
        font-size: 15px !important;
      }
      
      .mobile-dropdown input[type="checkbox"] {
        width: 24px !important;
        height: 24px !important;
      }
      
      .mobile-dropdown label, .mobile-dropdown span {
        font-size: 14px !important;
      }
      
      .mobile-dropdown img {
        width: 40px !important;
        height: 40px !important;
      }
    }
  </style>
</head>
<body>

<h2>Hero Cooldown Analyzer</h2>
<h4>Latest Version 2.1.61.11705</h4>
<h6>pabalato pag nanalo TY hehez</h6>

<div id="categories"></div>
<div id="heroes"></div>

<!-- SPELL PICK -->
<div id="spellModal" class="modal hidden">
  <div class="modal-content">
    <h3>Select Battle Spell</h3>
    <div id="spellOptions"></div>
  </div>
</div>

<div id="lineup"></div>

<!-- Scroll to Top Button -->
<button id="scrollToTopBtn" title="Go to top" style="
  display: none;
  position: fixed;
  bottom: 30px;
  right: 30px;
  z-index: 1000;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
  color: white;
  border: none;
  box-shadow: 0 4px 12px rgba(14, 165, 233, 0.4);
  cursor: pointer;
  font-size: 24px;
  font-weight: bold;
  transition: transform 0.2s, box-shadow 0.2s;
">↑</button>

<script src="script.js"></script>

<!-- Mobile Optimization Script -->
<script>
  function applyMobileOptimizations() {
    const enemies = document.querySelectorAll('.enemy');
    enemies.forEach(enemy => {
      enemy.classList.add('mobile-hero-card');
      const allBtns = enemy.querySelectorAll('button');
      allBtns.forEach(btn => {
        if (btn.textContent === '1' || btn.textContent === '2' || btn.textContent === '3') {
          btn.classList.add('level-btn');
        }
      });
      const skillRows = enemy.querySelectorAll('.skill-row');
      skillRows.forEach(row => {
        row.classList.add('mobile-skill-row');
      });
    });
    
    const searchInput = document.querySelector('input[type="text"]');
    if (searchInput) searchInput.classList.add('search-hero');
    
    const categoryBtns = document.querySelectorAll('#categories button');
    categoryBtns.forEach(btn => btn.classList.add('category-btn'));
  }
  
  const lineupObserver = new MutationObserver(function() {
    applyMobileOptimizations();
  });
  
  window.addEventListener('DOMContentLoaded', function() {
    setTimeout(applyMobileOptimizations, 100);
    if (document.getElementById('lineup')) {
      lineupObserver.observe(document.getElementById('lineup'), { 
        childList: true, 
        subtree: true 
      });
    }
  });
  
  window.addEventListener('resize', function() {
    applyMobileOptimizations();
  });
</script>

</body>
</html>
