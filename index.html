<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ML Cooldown Tracker</title>
  
  <!-- PROTECTION SCRIPT -->
  <script>
  // Disable Right Click
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    return false;
  });

  // Disable F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U, Ctrl+S
  document.addEventListener('keydown', function(e) {
    if (e.keyCode === 123) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && e.keyCode === 73) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && e.keyCode === 74) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.keyCode === 83) { e.preventDefault(); return false; }
  });

  // Disable Console
  setInterval(function() {
    console.log = function() {};
    console.warn = function() {};
    console.error = function() {};
    console.clear = function() {};
    console.table = function() {};
  }, 1000);
  </script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Hero Cooldown Analyzer</h2>
<h4>Latest Version 2.1.61.11705</h4>
<h6>pabalato pag nanalo TY hehez</h6>

<div id="categories"></div>
<div id="heroes"></div>

<!-- SPELL PICK -->
<div id="spellModal" class="modal hidden">
  <div class="modal-content">
    <h3>Select Battle Spell</h3>
    <div id="spellOptions"></div>
  </div>
</div>

<div id="lineup"></div>

<!-- Scroll to Top Button -->
<button id="scrollToTopBtn" title="Go to top" style="
  display: none;
  position: fixed;
  bottom: 30px;
  right: 30px;
  z-index: 1000;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
  color: white;
  border: none;
  box-shadow: 0 4px 12px rgba(14, 165, 233, 0.4);
  cursor: pointer;
  font-size: 24px;
  font-weight: bold;
  transition: transform 0.2s, box-shadow 0.2s;
">↑</button>

<!-- Dynamic Script Loading (para hindi makita sa Sources tab agad) -->
<script>
(function() {
  var script = document.createElement('script');
  script.src = 'script.js';
  document.head.appendChild(script);
})();
</script>

</body>
</html>
